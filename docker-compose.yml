version: '3.8'
services:
  jagx-bot:
    build: .
    container_name: jagx-whatsapp-bot
    environment:
      - BOT_NAME=JagX WhatsApp Bot
      - BOT_PREFIX=.
      - AUTO_READ=true
      - AUTO_TYPING=true
      - PORT=3000
    ports:
      - "3000:3000"
    volumes:
      - ./sessions:/app/sessions
      - ./logs:/app/logs
    restart: unless-stopped
